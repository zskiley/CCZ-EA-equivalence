name: install-test

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  pip-install:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install package
        env:
          CXX: g++
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install .

      - name: Smoke test
        run: |
          python -c "import ccz; print('import_ok')"
          python -c "import ccz; r = ccz.ccz_auto(lambda x: x, n_bits=3, time_limit_seconds=0.1); print('order', r['order'])"
